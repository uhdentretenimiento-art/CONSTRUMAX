name: Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Prepare deploy bundle
        run: |
          set -euo pipefail

          rm -rf deploy
          mkdir -p deploy/nodejs/.next

          cp -a .next/standalone/. deploy/nodejs/
          cp -a .next/static deploy/nodejs/.next/

          tar -czf deploy-nodejs.tar.gz -C deploy nodejs

      - name: Upload bundle to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME || secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '65002' }}
          source: deploy-nodejs.tar.gz
          target: ~/domains/construmaxpiscinas.com/.deploy-upload
          overwrite: true

      - name: Publish bundle on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME || secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '65002' }}
          timeout: 60s
          command_timeout: 30m
          debug: true
          script: |
            set -euo pipefail

            DEPLOY_ROOT="$HOME/domains/construmaxpiscinas.com/nodejs"
            PUBLIC_ROOT="$HOME/domains/construmaxpiscinas.com/public_html"
            UPLOAD_ROOT="$HOME/domains/construmaxpiscinas.com/.deploy-upload"
            RELEASE_ROOT="$HOME/domains/construmaxpiscinas.com/.deploy-release"
            BUNDLE="$UPLOAD_ROOT/deploy-nodejs.tar.gz"

            rm -rf "$RELEASE_ROOT"
            mkdir -p "$RELEASE_ROOT" "$DEPLOY_ROOT/tmp"

            tar -xzf "$BUNDLE" -C "$RELEASE_ROOT"

            find "$DEPLOY_ROOT" -mindepth 1 -maxdepth 1 \
              ! -name 'tmp' \
              ! -name 'console.log' \
              ! -name 'stderr.log' \
              -exec rm -rf {} +

            cp -a "$RELEASE_ROOT/nodejs/." "$DEPLOY_ROOT/"

            ln -sfn "$HOME/storage/uploads/images" "$PUBLIC_ROOT/images"
            ln -sfn "$HOME/storage/uploads/videos" "$PUBLIC_ROOT/videos"

            touch "$DEPLOY_ROOT/tmp/restart.txt"

            rm -rf "$RELEASE_ROOT"
            rm -f "$BUNDLE"